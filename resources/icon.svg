<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16213e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <!-- Accent glow -->
    <radialGradient id="glow" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="rgba(0,212,170,0.25)"/>
      <stop offset="100%" stop-color="rgba(0,212,170,0)"/>
    </radialGradient>
    <!-- Shield gradient -->
    <linearGradient id="shieldGrad" x1="0.5" y1="0" x2="0.5" y2="1">
      <stop offset="0%" stop-color="#00d4aa"/>
      <stop offset="100%" stop-color="#00a88a"/>
    </linearGradient>
    <!-- Shadow filter -->
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="20" flood-color="rgba(0,0,0,0.5)"/>
    </filter>
    <filter id="innerGlow">
      <feDropShadow dx="0" dy="0" stdDeviation="15" flood-color="rgba(0,212,170,0.4)"/>
    </filter>
  </defs>

  <!-- macOS-style rounded rect background -->
  <rect x="40" y="40" width="944" height="944" rx="210" ry="210" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- Subtle border -->
  <rect x="40" y="40" width="944" height="944" rx="210" ry="210" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="2"/>

  <!-- Glow effect -->
  <rect x="40" y="40" width="944" height="944" rx="210" ry="210" fill="url(#glow)"/>

  <!-- Grid pattern (subtle) -->
  <g opacity="0.04">
    <line x1="120" y1="100" x2="120" y2="924" stroke="white" stroke-width="1"/>
    <line x1="176" y1="100" x2="176" y2="924" stroke="white" stroke-width="1"/>
    <line x1="232" y1="100" x2="232" y2="924" stroke="white" stroke-width="1"/>
    <line x1="288" y1="100" x2="288" y2="924" stroke="white" stroke-width="1"/>
    <line x1="344" y1="100" x2="344" y2="924" stroke="white" stroke-width="1"/>
    <line x1="400" y1="100" x2="400" y2="924" stroke="white" stroke-width="1"/>
    <line x1="456" y1="100" x2="456" y2="924" stroke="white" stroke-width="1"/>
    <line x1="512" y1="100" x2="512" y2="924" stroke="white" stroke-width="1"/>
    <line x1="568" y1="100" x2="568" y2="924" stroke="white" stroke-width="1"/>
    <line x1="624" y1="100" x2="624" y2="924" stroke="white" stroke-width="1"/>
    <line x1="680" y1="100" x2="680" y2="924" stroke="white" stroke-width="1"/>
    <line x1="736" y1="100" x2="736" y2="924" stroke="white" stroke-width="1"/>
    <line x1="792" y1="100" x2="792" y2="924" stroke="white" stroke-width="1"/>
    <line x1="848" y1="100" x2="848" y2="924" stroke="white" stroke-width="1"/>
    <line x1="904" y1="100" x2="904" y2="924" stroke="white" stroke-width="1"/>
    <line x1="100" y1="120" x2="924" y2="120" stroke="white" stroke-width="1"/>
    <line x1="100" y1="176" x2="924" y2="176" stroke="white" stroke-width="1"/>
    <line x1="100" y1="232" x2="924" y2="232" stroke="white" stroke-width="1"/>
    <line x1="100" y1="288" x2="924" y2="288" stroke="white" stroke-width="1"/>
    <line x1="100" y1="344" x2="924" y2="344" stroke="white" stroke-width="1"/>
    <line x1="100" y1="400" x2="924" y2="400" stroke="white" stroke-width="1"/>
    <line x1="100" y1="456" x2="924" y2="456" stroke="white" stroke-width="1"/>
    <line x1="100" y1="512" x2="924" y2="512" stroke="white" stroke-width="1"/>
    <line x1="100" y1="568" x2="924" y2="568" stroke="white" stroke-width="1"/>
    <line x1="100" y1="624" x2="924" y2="624" stroke="white" stroke-width="1"/>
    <line x1="100" y1="680" x2="924" y2="680" stroke="white" stroke-width="1"/>
    <line x1="100" y1="736" x2="924" y2="736" stroke="white" stroke-width="1"/>
    <line x1="100" y1="792" x2="924" y2="792" stroke="white" stroke-width="1"/>
    <line x1="100" y1="848" x2="924" y2="848" stroke="white" stroke-width="1"/>
    <line x1="100" y1="904" x2="924" y2="904" stroke="white" stroke-width="1"/>
  </g>

  <!-- Shield icon -->
  <g transform="translate(512, 420)" filter="url(#innerGlow)">
    <!-- Shield shape -->
    <path d="M0,-220 C80,-220 160,-200 220,-170 L220,40 C220,160 120,260 0,310 C-120,260 -220,160 -220,40 L-220,-170 C-160,-200 -80,-220 0,-220 Z"
          fill="url(#shieldGrad)" opacity="0.9"/>

    <!-- Shield inner highlight -->
    <path d="M0,-190 C65,-190 130,-175 180,-150 L180,30 C180,130 100,215 0,260 C-100,215 -180,130 -180,30 L-180,-150 C-130,-175 -65,-190 0,-190 Z"
          fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>

    <!-- Checkmark inside shield -->
    <path d="M-70,20 L-20,70 L80,-40"
          fill="none" stroke="white" stroke-width="32" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Scanning circle rings -->
  <circle cx="512" cy="420" r="300" fill="none" stroke="rgba(0,212,170,0.1)" stroke-width="1.5"/>
  <circle cx="512" cy="420" r="340" fill="none" stroke="rgba(0,212,170,0.06)" stroke-width="1"/>

  <!-- Corner dots (data points) -->
  <circle cx="212" cy="200" r="5" fill="rgba(0,212,170,0.5)"/>
  <circle cx="812" cy="200" r="5" fill="rgba(0,212,170,0.5)"/>
  <circle cx="160" cy="500" r="4" fill="rgba(59,130,246,0.5)"/>
  <circle cx="864" cy="500" r="4" fill="rgba(59,130,246,0.5)"/>
  <circle cx="250" cy="750" r="3" fill="rgba(168,85,247,0.4)"/>
  <circle cx="774" cy="750" r="3" fill="rgba(168,85,247,0.4)"/>

  <!-- Text: iMacOS -->
  <text x="512" y="780" text-anchor="middle" font-family="-apple-system, 'SF Pro Display', 'Helvetica Neue', sans-serif" font-size="110" font-weight="800" letter-spacing="3">
    <tspan fill="white">i</tspan><tspan fill="white">Mac</tspan><tspan fill="#00d4aa">OS</tspan>
  </text>

  <!-- Subtitle -->
  <text x="512" y="840" text-anchor="middle" font-family="-apple-system, 'SF Pro Text', sans-serif" font-size="44" font-weight="500" fill="rgba(255,255,255,0.4)" letter-spacing="6">
    SECURITY
  </text>
</svg>